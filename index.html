<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Status CDN</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f8f9fa;
        }
        .status-card {
            text-align: center;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            background: white;
        }
    </style>
</head>
<body>

    <div class="status-card">
        <h1 class="display-4">Status CDN</h1>
        <hr>
        <p class="lead">Jika tombol di bawah berwarna <strong>biru</strong>, maka CDN Bootstrap aktif.</p>
        
        <button class="btn btn-primary btn-lg">CDN Aktif!</button>
        
        <div class="mt-4 text-muted">
            <small>Dihosting di GitHub Pages</small>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
